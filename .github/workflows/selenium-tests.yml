name: Demo Web Shop Automation CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Run daily at 6 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
  # Allows manual trigger from GitHub UI

jobs:
  test:
    name: Run Selenium Cucumber Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        browser: [chrome]
        # For multiple browsers, you can add: [chrome, firefox]
        # Note: Firefox requires different setup

    steps:
      # Step 1: Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up JDK 11
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      # Step 3: Cache Maven dependencies
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      # Step 4: Cache WebDriver binaries (WebDriverManager handles this)
      - name: Cache WebDriver Manager
        uses: actions/cache@v4
        with:
          path: ~/.cache/webdrivermanager
          key: ${{ runner.os }}-webdrivermanager

      # Step 5: Setup Chrome (Official GitHub Action)
      - name: Setup Chrome
        uses: actions/setup-chrome@v1
        with:
          chrome-version: 'stable'

      # Step 6: Display versions for debugging
      - name: Display environment versions
        run: |
          echo "Java version:"
          java -version
          echo "Maven version:"
          mvn --version
          echo "Chrome version:"
          google-chrome --version

      # Step 7: Run tests with Maven
      - name: Run Selenium Tests
        run: |
          mvn clean test
        env:
          BROWSER: ${{ matrix.browser }}
          CI: true
          HEADLESS: true

      # Step 8: Upload Extent Report
      - name: Upload Extent Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-report-${{ matrix.browser }}-${{ github.run_number }}
          path: test-output/ExtentReports/*.html
          retention-days: 30

      # Step 9: Upload Cucumber Report
      - name: Upload Cucumber Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-reports-${{ matrix.browser }}-${{ github.run_number }}
          path: |
            target/cucumber-reports/
            target/cucumber-html-reports/
          retention-days: 30

      # Step 10: Upload Screenshots on failure
      - name: Upload Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots-${{ github.run_number }}
          path: test-output/Screenshots/
          retention-days: 14